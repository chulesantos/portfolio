<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CS Computer Systems – Portfólio de Serviços</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2A5DA8;--navy:#1A3A5C;--sky:#4A90C4;
  --light:#F0F5FB;--border:#DDE7F2;
  --text:#1E2A38;--muted:#6B7C93;
  --green:#1E7E34;--font:'Inter',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:#fff;overflow-x:hidden}

nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,0.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:62px;
}
.nav-logo-wrap{display:flex;align-items:center;text-decoration:none}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{
  color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;
  padding:6px 14px;border-radius:6px;transition:background .15s,color .15s;
}
.nav-links a:hover,.nav-links a.active{background:var(--light);color:var(--blue)}

#hero{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:100px 24px 60px;
  background:linear-gradient(135deg,#f5f8fc 0%,#edf3fb 60%,#e3edf8 100%);
  position:relative;overflow:hidden;
}
#hero::before{
  content:'';position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(42,93,168,.06),transparent 70%);
  top:-150px;right:-150px;pointer-events:none;
}
.hero-inner{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;position:relative;z-index:1;max-width:680px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(42,93,168,.08);border:1px solid rgba(42,93,168,.18);
  color:var(--blue);font-size:.72rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:7px 20px;border-radius:100px;margin-bottom:28px;
}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue)}
#hero h1{font-size:clamp(2rem,5vw,2.8rem);font-weight:800;color:var(--navy);letter-spacing:-1.5px;line-height:1.1;margin-bottom:14px}
#hero h1 span{color:var(--blue)}
#hero .sub{font-size:.97rem;color:var(--muted);line-height:1.7;max-width:500px;margin-bottom:6px}
#hero .cnpj{font-size:.73rem;color:#b0bfcc}
.scroll-cue{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  color:#b0bfcc;font-size:.68rem;letter-spacing:1px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:bob 2.2s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}

section{padding:88px 0}
section.alt{background:#f7f9fc}
.container{max-width:960px;margin:0 auto;padding:0 36px}
.eyebrow{font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--sky);margin-bottom:8px}
.sec-h2{font-size:clamp(1.5rem,2.8vw,2rem);font-weight:800;color:var(--navy);margin-bottom:12px;letter-spacing:-.5px}
.sec-bar{width:40px;height:3px;background:var(--blue);border-radius:2px;margin-bottom:40px}
.body-text{font-size:.95rem;line-height:1.85;color:#334155;max-width:720px}
.body-text+.body-text{margin-top:14px}

.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.svc{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:26px 22px;border-top:3px solid var(--blue);
  transition:box-shadow .2s,transform .2s;
}
.svc:hover{box-shadow:0 12px 36px rgba(42,93,168,.1);transform:translateY(-2px)}
.svc-i{font-size:1.5rem;margin-bottom:12px}
.svc h3{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:8px}
.svc p{font-size:.84rem;color:var(--muted);line-height:1.65}

.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.diff{display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.diff-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:6px}
.diff h4{font-size:.88rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.diff p{font-size:.82rem;color:var(--muted);line-height:1.55}

.ccard{
  display:flex;gap:24px;align-items:flex-start;
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:26px;margin-bottom:16px;transition:box-shadow .2s;
}
.ccard:hover{box-shadow:0 8px 28px rgba(42,93,168,.08)}
.logo-box{
  width:110px;min-width:110px;height:86px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.logo-box img{max-width:100%;max-height:100%;object-fit:contain}
.lb-white{background:#fff;border:1px solid var(--border)}
.lb-blue{background:#1EBDE5}
.lb-pad{background:#fff;border:1px solid var(--border);padding:10px}
.cinfo{flex:1;min-width:0}
.cname{font-size:1.06rem;font-weight:700;color:var(--navy);margin-bottom:3px}
.cseg{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.sticker{display:inline-flex;align-items:center;gap:5px;font-size:.71rem;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:14px}
.st-on{background:#e6f4ea;color:#1E7E34}
.st-off{background:#f1f3f4;color:#888}
.cdesc{font-size:.84rem;color:#334155;line-height:1.72;margin-bottom:12px}
.clinks{display:flex;flex-direction:column;gap:4px}
.cl{font-size:.79rem;color:var(--muted)}
.cl strong{color:var(--navy)}
.cl a{color:var(--blue);text-decoration:none}
.cl a:hover{text-decoration:underline}
.sep{height:1px;background:#edf1f7;margin:0 0 16px}

.pcard{
  display:flex;gap:28px;align-items:center;
  background:linear-gradient(135deg,var(--light),#e4eef8);
  border:1px solid var(--border);border-radius:14px;padding:32px;
}
.plogo{width:130px;min-width:130px;display:flex;align-items:center}
.plogo img{max-width:120px;height:auto;border-radius:8px}
.pinfo h3{font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.pinfo p{font-size:.86rem;color:#334155;line-height:1.72;margin-bottom:10px}
.plink{font-size:.82rem;color:var(--blue);font-weight:600;text-decoration:none}
.plink:hover{text-decoration:underline}

#contato{background:var(--navy)}
#contato .eyebrow{color:rgba(255,255,255,.4)}
#contato .sec-h2{color:#fff}
#contato .sec-bar{background:var(--sky)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:48px}
.cname2{font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:4px}
.crole{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:26px}
.ci{display:flex;gap:10px;margin-bottom:13px;font-size:.84rem;color:rgba(255,255,255,.65);line-height:1.6}
.ci a{color:rgba(255,255,255,.65);text-decoration:none}
.ci a:hover{color:#fff}

footer{background:#0d1f33;text-align:center;padding:18px;font-size:.72rem;color:rgba(255,255,255,.2);letter-spacing:.3px}

.r{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease}
.r.v{opacity:1;transform:none}

@media(max-width:680px){
  nav{padding:0 16px}
  .nav-links a{padding:5px 8px;font-size:12px}
  .svc-grid,.diff-grid,.cgrid{grid-template-columns:1fr}
  .ccard,.pcard{flex-direction:column}
  .logo-box,.plogo{width:100%;height:auto;min-width:0;justify-content:flex-start}
}
</style>
</head>
